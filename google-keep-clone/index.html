<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Google Keep Clone</title>

  <!-- Bootstrap Icons -->
<link
  rel="stylesheet"
  href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
/>

  <!-- Custom CSS -->
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <!-- HEADER -->
  <header class="app-header">
  <div class="header-left">
    <button class="icon-btn" id="menuBtn" title="Menu">
      <i class="bi bi-list"></i>
    </button>

    <div class="logo-area">
      <img
        src="images/google-keep-logo.png"
        alt="Google Keep"
        class="keep-logo"
      />

      <h1>Keep</h1>
    </div>
  </div> <!-- CLOSE HEADER-LEFT HERE -->

  <div class="search-box">
    <i class="bi bi-search"></i>
    <input type="text" id="searchInput" placeholder="Search" />
  </div>

  <div class="header-actions">
    <button class="icon-btn" title="Refresh">
      <i class="bi bi-arrow-clockwise"></i>
    </button>

    <button class="icon-btn" id="viewToggleBtn" title="Toggle view">
      <i class="bi bi-view-stacked"></i>
    </button>

    <button class="icon-btn" title="Settings">
      <i class="bi bi-gear"></i>
    </button>

    <button class="icon-btn" title="Google Apps">
      <i class="bi bi-grid-3x3-gap-fill"></i>
    </button>

    <img
      src="images/angie-profile.jpg"
      alt="Angie profile"
      class="profile-picture"
    />
  </div>
</header>
  <div class="app-layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <button class="side-link active" id="notesViewBtn">
        <i class="bi bi-lightbulb"></i>
        <span>Notes</span>
      </button>

<button class="side-link" id="remindersViewBtn">
  <i class="bi bi-bell"></i>
  <span>Reminders</span>
</button>

<button class="side-link" id="labelsViewBtn">
  <i class="bi bi-pencil"></i>
  <span>Edit labels</span>
</button>

<button class="side-link" id="archiveViewBtn">
  <i class="bi bi-archive"></i>
  <span>Archive</span>
</button>

<button class="side-link" id="trashViewBtn">
  <i class="bi bi-trash"></i>
  <span>Trash</span>
</button>

</aside>

    <!-- MAIN CONTENT -->
    <main class="main-content">
      <!-- NOTE INPUT -->
      <section class="note-form-card" id="noteFormCard">
  <div id="collapsedNote" class="collapsed-note">
    <span>Take a note...</span>

    <div class="collapsed-icons">
      <i class="bi bi-check-square"></i>
      <i class="bi bi-brush"></i>
      <i class="bi bi-image"></i>
    </div>
  </div>

  <div id="expandedNote" class="expanded-note">

<button class="pin-note-btn" type="button" title="Pin note">
  <i class="bi bi-pin"></i>
</button>

    <input
      type="text"
      id="noteTitle"
      placeholder="Title"
      class="note-title-input"
    />

    <textarea
      id="noteText"
      placeholder="Take a note..."
      class="note-text-input"
    ></textarea>

    <div class="note-form-actions">
  <div class="note-tools">
    <button class="small-icon-btn" type="button" title="Formatting">
  <span class="format-icon">A</span>
</button>

    <button class="small-icon-btn" type="button" title="Change color">
      <i class="bi bi-palette"></i>
    </button>

    <button class="small-icon-btn" type="button" title="Add reminder">
      <i class="bi bi-bell"></i>
    </button>

    <button class="small-icon-btn" type="button" title="Add collaborator">
      <i class="bi bi-person-plus"></i>
    </button>

    <button class="small-icon-btn" type="button" title="Add image">
      <i class="bi bi-image"></i>
    </button>

    <button class="small-icon-btn" title="Archive">
    <i class="bi bi-archive"></i>
</button>

    <button class="small-icon-btn" type="button" title="More">
      <i class="bi bi-three-dots-vertical"></i>
    </button>

    <button class="small-icon-btn muted-tool" type="button" title="Undo">
      <i class="bi bi-arrow-counterclockwise"></i>
    </button>

    <button class="small-icon-btn muted-tool" type="button" title="Redo">
      <i class="bi bi-arrow-clockwise"></i>
    </button>
  </div>

  <button id="addNoteBtn" class="close-btn" type="button">Close</button>
</div>
  </div>
</section>

      <!-- EMPTY MESSAGE -->
      <div id="emptyState" class="empty-state">
        <i class="bi bi-lightbulb"></i>
        <p>Notes you add appear here</p>
      </div>

      <!-- NOTES GRID -->
      <section id="notesContainer" class="notes-grid"></section>
    </main>
  </div>

  <!-- EDIT MODAL -->
  <div id="editModal" class="modal-overlay">
    <div class="edit-modal">
      <button id="closeModalBtn" class="modal-close-btn" title="Close">
        <i class="bi bi-x-lg"></i>
      </button>

      <input
        type="text"
        id="editTitle"
        class="edit-title-input"
        placeholder="Title"
      />

      <textarea
        id="editText"
        class="edit-text-input"
        placeholder="Edit your note..."
      ></textarea>

      <div class="edit-modal-actions">
        <button id="saveEditBtn" class="close-btn">Save</button>
      </div>
    </div>
  </div>

  <!-- JavaScript -->
  <script src="script.js"></script>
</body>
</html>
